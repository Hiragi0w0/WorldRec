name: Release

# `v*` タグ (例: v0.1.0) を push するとテスト → リリースビルドを実行し、
# インストーラーを添付したドラフトのプレリリースを作成する。
on:
  push:
    tags:
      - 'v*'

# tauri-action が Release を作成/更新するために書き込み権限が必要。
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # リリース前の品質ゲート。テストが通らなければ build は実行されない。
  test:
    name: Test gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: sidecar/go.mod
          cache-dependency-path: sidecar/go.sum

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Go vet & test
        working-directory: sidecar
        run: |
          go vet ./...
          go test ./...

      # externalBin (binaries/worldrec-ai-<triple>.exe) を生成。
      # cargo test でも Tauri の build script が tauri.conf.json を検証するため必要。
      - name: Build sidecar binary
        run: npm run build:sidecar

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  release:
    name: Build & draft release (Windows)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # build:sidecar (beforeBuildCommand 内で実行される) が go を使う。
      - uses: actions/setup-go@v5
        with:
          go-version-file: sidecar/go.mod
          cache-dependency-path: sidecar/go.sum

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # Tauri の build script が externalBin を検証する前に、
      # 必須の src-tauri/binaries/worldrec-ai-<triple>.exe を生成する。
      - name: Build sidecar binary
        run: npm run build:sidecar

      # tauri build が beforeBuildCommand (build:sidecar → build) を実行し、
      # 生成したインストーラーを Release に添付する。
      - name: Build and draft release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'WorldRec ${{ github.ref_name }}'
          releaseBody: |
            WorldRec ${{ github.ref_name }} のベータリリースです。

            ## インストール
            下部の **Assets** からインストーラー (`.msi` または `.exe`) をダウンロードして実行してください。

            > 現在のベータ版は未署名のため、初回起動時に Windows SmartScreen の警告が表示される場合があります。
            > その場合は「詳細情報」→「実行」で続行できます。

            ## ファイルの整合性確認（任意）
            `SHA256SUMS.txt` にインストーラーのハッシュ値を記載しています。PowerShell で確認できます:
            ```powershell
            Get-FileHash .\WorldRec_*.msi -Algorithm SHA256
            ```

            ## 動作環境
            - Windows 10 / 11
            - WebView2 ランタイム（無い場合はインストーラーが自動導入します）
          releaseDraft: true
          prerelease: true

      # 未署名配布のため、ダウンロードしたファイルの改ざん検証用に
      # SHA256 チェックサムを生成して同じ Release に添付する。
      - name: Generate and upload SHA256 checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $paths = '${{ steps.tauri.outputs.artifactPaths }}' | ConvertFrom-Json
          $lines = foreach ($p in $paths) {
            if (Test-Path $p) {
              $hash = (Get-FileHash -Path $p -Algorithm SHA256).Hash.ToLower()
              "$hash  $(Split-Path $p -Leaf)"
            }
          }
          if (-not $lines) {
            Write-Error "チェックサム対象の成果物が見つかりませんでした。"
            exit 1
          }
          $lines | Set-Content -Path SHA256SUMS.txt -Encoding ascii
          Write-Host "生成した SHA256SUMS.txt:"
          Get-Content SHA256SUMS.txt
          gh release upload ${{ github.ref_name }} SHA256SUMS.txt --clobber
