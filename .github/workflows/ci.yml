name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチ/PR で新しい push があれば古い実行をキャンセルする
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Go サイドカー (worldrec-ai) の静的解析とテスト
  sidecar:
    name: Go sidecar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: sidecar/go.mod
          cache-dependency-path: sidecar/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  # フロントエンド (Svelte + TypeScript) の型検査とビルド
  frontend:
    name: Frontend check & build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

  # Rust / Tauri のテスト。サイドカーバイナリを先に生成してから実行する。
  rust:
    name: Rust & Tauri
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: sidecar/go.mod
          cache-dependency-path: sidecar/go.sum

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # externalBin (binaries/worldrec-ai-<triple>.exe) を生成。
      # このスクリプトは go build と rustc -vV (host triple 取得) を使う。
      - name: Build sidecar binary
        run: npm run build:sidecar

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
